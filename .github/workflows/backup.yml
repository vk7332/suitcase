name: SUITCASE Backup & Build Check

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Create Backup ZIP
        run: zip -r suitcase-backup.zip . -x "node_modules/*"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: suitcase-backup
          path: suitcase-backup.zip
  build-check:
    runs-on: ubuntu-latest
    needs: backup

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: suitcase-build
          path: dist/