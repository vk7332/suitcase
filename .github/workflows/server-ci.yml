name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: server
    env:
      NODE_ENV: production
      PORT: 8080
      FRONTEND_URL: http://localhost:5173
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
      JWT_SECRET: ci-only-jwt-secret
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder-openai-key' }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID || 'placeholder-razorpay-key' }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET || 'placeholder-razorpay-secret' }}
      RAZORPAY_PLAN_PRO: plan_ci_pro
      RAZORPAY_PLAN_ENTERPRISE: plan_ci_enterprise

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Start compiled server
        run: |
          node dist/index.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        shell: bash
        run: |
          for i in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
